name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:

# ══════════════════════════════════════════════════════════════════════
# BUILD WINDOWS — unchanged
# ══════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install pywebview
          pip install requests
          pip install cryptography
          pip install pillow
          pip install numpy
          pip install faiss-cpu
          pip install onnxruntime
          pip install psd-tools
          pip install onnx

      - name: Download encrypted model using GitHub CLI
        run: |
          New-Item -ItemType Directory -Force -Path "models"
          gh release download v1.0.0 --repo Aatmanbho2429/Visara --pattern "clip_vitb32.onnx.enc" --dir "models"
          Write-Host "Model downloaded: $(Get-Item models/clip_vitb32.onnx.enc | Select-Object -ExpandProperty Length) bytes"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular
        run: |
          cd UI
          npm install
          npm run build:angular

      - name: Build Windows exe
        run: |
          pyinstaller --name Visara `
            --onefile `
            --windowed `
            --icon visara-logo.ico `
            --add-data "UI/dist/vynce-standalone/browser;UI/dist/vynce-standalone/browser" `
            --add-data "models;models" `
            --add-data "visara-logo.ico;." `
            --collect-all onnxruntime `
            --collect-all pywebview `
            --collect-all faiss `
            --hidden-import PIL `
            --hidden-import PIL._imagingtk `
            --hidden-import psd_tools `
            --hidden-import cryptography `
            --hidden-import requests `
            main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visara-Windows
          path: dist/Visara.exe

# ══════════════════════════════════════════════════════════════════════
# BUILD MACOS ARM — M1/M2/M3/M4
# ══════════════════════════════════════════════════════════════════════
  build-macos-arm:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pywebview requests cryptography
          pip install pillow numpy faiss-cpu onnxruntime psd-tools onnx

      - name: Download encrypted model
        run: |
          mkdir -p models
          gh release download v1.0.0 --repo Aatmanbho2429/Visara --pattern "clip_vitb32.onnx.enc" --dir "models"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular
        run: cd UI && npm install && npm run build:angular

      - name: Build macOS ARM app
        run: |
          pyinstaller --name Visara \
            --windowed \
            --icon visara-logo.icns \
            --add-data "UI/dist/vynce-standalone/browser:UI/dist/vynce-standalone/browser" \
            --add-data "models:models" \
            --add-data "visara-logo.icns:." \
            --collect-all onnxruntime \
            --collect-all pywebview \
            --collect-all faiss \
            --hidden-import PIL \
            --hidden-import PIL._imagingtk \
            --hidden-import psd_tools \
            --hidden-import cryptography \
            --hidden-import requests \
            main.py

      - name: Sign + remove quarantine
        run: |
          codesign --force --deep --sign - dist/Visara.app
          xattr -cr dist/Visara.app

      - name: Zip ARM app
        run: cd dist && zip -r ../Visara-macOS-Apple-Silicon.zip Visara.app

      - name: Upload ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visara-macOS-ARM
          path: Visara-macOS-Apple-Silicon.zip

# ══════════════════════════════════════════════════════════════════════
# BUILD MACOS INTEL — 2019 and older Macs
# ══════════════════════════════════════════════════════════════════════
  build-macos-intel:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11 x86_64
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install Python dependencies (Intel via Rosetta)
        run: |
          arch -x86_64 pip install pyinstaller pywebview requests cryptography
          arch -x86_64 pip install pillow numpy faiss-cpu onnxruntime psd-tools onnx

      - name: Download encrypted model
        run: |
          mkdir -p models
          gh release download v1.0.0 --repo Aatmanbho2429/Visara --pattern "clip_vitb32.onnx.enc" --dir "models"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular
        run: cd UI && npm install && npm run build:angular

      - name: Build macOS Intel app
        run: |
          arch -x86_64 pyinstaller --name Visara \
            --windowed \
            --icon visara-logo.icns \
            --add-data "UI/dist/vynce-standalone/browser:UI/dist/vynce-standalone/browser" \
            --add-data "models:models" \
            --add-data "visara-logo.icns:." \
            --collect-all onnxruntime \
            --collect-all pywebview \
            --collect-all faiss \
            --hidden-import PIL \
            --hidden-import PIL._imagingtk \
            --hidden-import psd_tools \
            --hidden-import cryptography \
            --hidden-import requests \
            main.py

      - name: Sign + remove quarantine
        run: |
          codesign --force --deep --sign - dist/Visara.app
          xattr -cr dist/Visara.app

      - name: Zip Intel app
        run: cd dist && zip -r ../Visara-macOS-Intel.zip Visara.app

      - name: Upload Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visara-macOS-Intel
          path: Visara-macOS-Intel.zip

# ══════════════════════════════════════════════════════════════════════
# CREATE RELEASE
# ══════════════════════════════════════════════════════════════════════
  release:
    needs: [build-windows, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Update version.json
        run: |
          cat > version.json << EOF
          {
            "version": "${VERSION}",
            "release_notes": "See GitHub release notes for details",
            "windows": {
              "url": "https://github.com/Aatmanbho2429/Visara/releases/download/v${VERSION}/Visara-Windows.exe"
            },
            "macos_arm": {
              "url": "https://github.com/Aatmanbho2429/Visara/releases/download/v${VERSION}/Visara-macOS-Apple-Silicon.zip"
            },
            "macos_intel": {
              "url": "https://github.com/Aatmanbho2429/Visara/releases/download/v${VERSION}/Visara-macOS-Intel.zip"
            }
          }
          EOF

      - name: Commit updated version.json
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: update version.json to v${VERSION}"
          git push origin main

      - name: Upload files to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "Visara v${{ env.VERSION }}"
          files: |
            Visara-Windows/Visara.exe
            Visara-macOS-ARM/Visara-macOS-Apple-Silicon.zip
            Visara-macOS-Intel/Visara-macOS-Intel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}