name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:

# ══════════════════════════════════════════════════════════════════════
# BUILD WINDOWS — unchanged
# ══════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install pywebview
          pip install requests
          pip install cryptography
          pip install pillow
          pip install numpy
          pip install faiss-cpu
          pip install onnxruntime
          pip install psd-tools
          pip install onnx

      - name: Download encrypted model using GitHub CLI
        run: |
          New-Item -ItemType Directory -Force -Path "models"
          gh release download v1.0.0 --repo Aatmanbho2429/Visara --pattern "clip_vitb32.onnx.enc" --dir "models"
          Write-Host "Model downloaded: $(Get-Item models/clip_vitb32.onnx.enc | Select-Object -ExpandProperty Length) bytes"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular
        run: |
          cd UI
          npm install
          npm run build:angular

      - name: Build Windows exe
        run: |
          pyinstaller --name Visara `
            --onefile `
            --windowed `
            --icon visara-logo.ico `
            --add-data "UI/dist/vynce-standalone/browser;UI/dist/vynce-standalone/browser" `
            --add-data "models;models" `
            --add-data "visara-logo.ico;." `
            --collect-all onnxruntime `
            --collect-all pywebview `
            --collect-all faiss `
            --hidden-import PIL `
            --hidden-import PIL._imagingtk `
            --hidden-import psd_tools `
            --hidden-import cryptography `
            --hidden-import requests `
            main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visara-Windows
          path: dist/Visara.exe

# ══════════════════════════════════════════════════════════════════════
# BUILD MACOS ARM (M1/M2/M3/M4)
# ══════════════════════════════════════════════════════════════════════
  build-macos-arm:
    runs-on: macos-latest   # ARM runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pywebview requests cryptography
          pip install pillow numpy faiss-cpu onnxruntime psd-tools onnx

      - name: Download encrypted model
        run: |
          mkdir -p models
          gh release download v1.0.0 --repo Aatmanbho2429/Visara --pattern "clip_vitb32.onnx.enc" --dir "models"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular
        run: cd UI && npm install && npm run build:angular

      - name: Build macOS ARM app
        run: |
          pyinstaller --name Visara \
            --windowed \
            --icon visara-logo.icns \
            --add-data "UI/dist/vynce-standalone/browser:UI/dist/vynce-standalone/browser" \
            --add-data "models:models" \
            --add-data "visara-logo.icns:." \
            --collect-all onnxruntime \
            --collect-all pywebview \
            --collect-all faiss \
            --hidden-import PIL \
            --hidden-import PIL._imagingtk \
            --hidden-import psd_tools \
            --hidden-import cryptography \
            --hidden-import requests \
            --target-architecture arm64 \
            main.py

      - name: Upload ARM binary
        uses: actions/upload-artifact@v4
        with:
          name: Visara-macOS-arm64
          path: dist/Visara.app

# ══════════════════════════════════════════════════════════════════════
# BUILD MACOS INTEL (x86_64)
# ══════════════════════════════════════════════════════════════════════
  build-macos-intel:
    runs-on: macos-13   # Intel runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pywebview requests cryptography
          pip install pillow numpy faiss-cpu onnxruntime psd-tools onnx

      - name: Download encrypted model
        run: |
          mkdir -p models
          gh release download v1.0.0 --repo Aatmanbho2429/Visara --pattern "clip_vitb32.onnx.enc" --dir "models"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular
        run: cd UI && npm install && npm run build:angular

      - name: Build macOS Intel app
        run: |
          pyinstaller --name Visara \
            --windowed \
            --icon visara-logo.icns \
            --add-data "UI/dist/vynce-standalone/browser:UI/dist/vynce-standalone/browser" \
            --add-data "models:models" \
            --add-data "visara-logo.icns:." \
            --collect-all onnxruntime \
            --collect-all pywebview \
            --collect-all faiss \
            --hidden-import PIL \
            --hidden-import PIL._imagingtk \
            --hidden-import psd_tools \
            --hidden-import cryptography \
            --hidden-import requests \
            --target-architecture x86_64 \
            main.py

      - name: Upload Intel binary
        uses: actions/upload-artifact@v4
        with:
          name: Visara-macOS-x86_64
          path: dist/Visara.app

# ══════════════════════════════════════════════════════════════════════
# MERGE INTO UNIVERSAL .app + CREATE RELEASE
# ══════════════════════════════════════════════════════════════════════
  release:
    needs: [build-windows, build-macos-arm, build-macos-intel]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Merge ARM + Intel into Universal binary using lipo
        run: |
          ARM_BIN="Visara-macOS-arm64/Visara.app/Contents/MacOS/Visara"
          X86_BIN="Visara-macOS-x86_64/Visara.app/Contents/MacOS/Visara"
          OUT_APP="Visara-macOS-arm64/Visara.app/Contents/MacOS/Visara"

          lipo -create -output "$OUT_BIN" "$ARM_BIN" "$X86_BIN"
          echo "Universal binary created ✅"
          lipo -info "$OUT_BIN"

      - name: Sign and remove quarantine
        run: |
          codesign --force --deep --sign - Visara-macOS-arm64/Visara.app
          xattr -cr Visara-macOS-arm64/Visara.app

      - name: Zip universal macOS app
        run: |
          cd Visara-macOS-arm64
          zip -r ../Visara-macOS.zip Visara.app

      - name: Update version.json
        run: |
          cat > version.json << EOF
          {
            "version": "${VERSION}",
            "release_notes": "See GitHub release notes for details",
            "windows": {
              "url": "https://github.com/Aatmanbho2429/Visara/releases/download/v${VERSION}/Visara-Windows.exe"
            },
            "macos": {
              "url": "https://github.com/Aatmanbho2429/Visara/releases/download/v${VERSION}/Visara-macOS.zip"
            }
          }
          EOF

      - name: Commit updated version.json
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: update version.json to v${VERSION}"
          git push origin main

      - name: Upload files to existing release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "Visara v${{ env.VERSION }}"
          files: |
            Visara-Windows/Visara.exe
            Visara-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}