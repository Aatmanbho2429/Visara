<!-- Kept exactly the same — main app shell -->
<div class="app-shell" [class.sidebar-collapsed]="isSidebarCollapsed">

    <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
        <div class="sidebar__logo">
            <img src="assets/images/visara-logo-horizontal.svg" alt="Visara" />
            <div class="sidebar__logo__icon"></div>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li routerLinkActive="active">
                    <a routerLink="/image">
                        <i class="pi pi-search"></i>
                        <span class="label">{{ "lblSearchEngine" | translate }}</span>
                    </a>
                </li>
                <li routerLinkActive="active">
                    <a routerLink="/loaded-data">
                        <i class="pi pi-folder-open"></i>
                        <span class="label">{{ "lblLoadedFoldersSidebar" | translate }}</span>
                    </a>
                </li>
                <li routerLinkActive="active">
                    <a routerLink="/activity-log">
                        <i class="pi pi-history"></i>
                        <span class="label">{{ "lblActivityLog" | translate }}</span>
                    </a>
                </li>
                <li routerLinkActive="active">
                    <a routerLink="/contact-us">
                        <i class="pi pi-user"></i>
                        <span class="label">{{ "lblContactUs" | translate }}</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="main-area">
        <button pButton icon="pi pi-bars" class="p-button-text sidebar-toggle"
            (click)="toggleSidebar()"></button>
        <main class="content">
            <router-outlet></router-outlet>
        </main>
    </div>

</div>

<!-- ── CHANGED — Login Screen (was License Invalid Overlay) ─────────── -->
<div class="license-overlay" *ngIf="isLoginRequired">
    <div class="license-card">

        <div class="license-card__icon">
            <i class="pi pi-lock"></i>
        </div>

        <h3 class="license-card__heading">Sign in to Visara</h3>
        <p class="license-card__message">Enter your credentials to continue</p>

        <!-- Email field -->
        <div class="license-card__field">
            <span class="p-input-icon-left" style="width:100%">
                <i class="pi pi-envelope"></i>
                <input
                    pInputText
                    type="email"
                    placeholder="Email"
                    [(ngModel)]="loginEmail"
                    style="width:100%"
                    (keyup.enter)="submitLogin()"
                />
            </span>
        </div>

        <!-- Password field -->
        <div class="license-card__field" style="margin-top: 12px">
            <span class="p-input-icon-left" style="width:100%">
                <i class="pi pi-key"></i>
                <input
                    pInputText
                    type="password"
                    placeholder="Password"
                    [(ngModel)]="loginPassword"
                    style="width:100%"
                    (keyup.enter)="submitLogin()"
                />
            </span>
        </div>

        <!-- Error message -->
        <div class="license-card__code" *ngIf="loginError" style="margin-top: 10px">
            <span style="color: #ef4444">{{ loginError }}</span>
        </div>

        <!-- Login button -->
        <div style="margin-top: 16px; width: 100%">
            <button
                pButton
                label="Sign In"
                icon="pi pi-sign-in"
                [loading]="loginLoading"
                (click)="submitLogin()"
                style="width: 100%">
            </button>
        </div>

        <!-- Device reset link -->
        <!-- <div class="license-card__footer" style="margin-top: 12px">

                    Request device reset
                </a>
            </p>
        </div> -->

    </div>
</div>
